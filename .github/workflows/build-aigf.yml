name: build-aigf

on:
  push:
    branches: [main]
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/lib/android /usr/local/.ghcup /opt/hostedtoolcache
          sudo docker image prune -af || true
          df -h /

      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push (ComfyUI 0.26.2 + cu128 torch, no models)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          target: base
          push: true
          provenance: false
          sbom: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            ghcr.io/bullseyelimited/aigf-comfyui-worker:krea-cu128
            ghcr.io/bullseyelimited/aigf-comfyui-worker:krea-0.26.2
            ghcr.io/bullseyelimited/aigf-comfyui-worker:latest
          build-args: |
            BASE_IMAGE=nvidia/cuda:12.8.1-cudnn-runtime-ubuntu24.04
            COMFYUI_VERSION=0.26.2
            CUDA_VERSION_FOR_COMFY=12.8
